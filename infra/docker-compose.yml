services:
  postgres:
    image: postgres:16
    env_file:
      - ../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ../api
    env_file:
      - ../.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  streamlit:
    build:
      context: ../app
    env_file:
      - ../.env
    environment:
      API_URL: ${API_URL}
    ports:
      - "8501:8501"
    depends_on:
      - api

volumes:
  pgdata:
